<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contato</title>
    <link rel="stylesheet" href="/style/contato.css">
</head>
<body>
    <h1>Nutri Sofia</h1>
    <div class="nav-container">
        <nav>
            <a href="index.html">Inicio</a>
            <a href="sobre.html">Sobre</a>
            <a href="resultados.html">Resultados</a>
            <a href="contato.html">Contato</a>
    </nav>
    </div>

    <div class="form-container">
        <h2>Entre em contato</h2>
        <form action="">
            <label for="name">Nome:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="number">Telefone:</label>
            <input type="tel" id="number" name="number" required>

            <label for="service">Serviço:</label>
            <select id="service" name="service" required>
                <option value="">Selecione um serviço</option>
                <option value="consultas">Consultas Nutricionais</option>
                <option value="planejamento">Planejamento Alimentar</option>
                <option value="assessoria">Assessoria em Dietas Específicas</option>
                <option value="esportiva">Nutrição Esportiva</option>
                <option value="suplementacao">Suplementação Nutricional</option>
            </select>   

            <label for="message">Mensagem:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Enviar</button>
        </form>

    </div>
</body>
</html>
